{% load i18n %}
{% for entry in entries %}
  <v-card class="my-2">
    <v-card-title class="blue-grey lighten-3">
      {{ entry.title }}
    </v-card-title>
    <v-card-text>
      <a href="{{ entry.get_absolute_url }}" title="{{ entry.title }}"
         rel="bookmark">{{ entry.title }}</a>
    </v-card-text>
  </v-card>
{% endfor %}
